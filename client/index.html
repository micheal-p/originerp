    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          { "@type": "Question", "name": "What is Collarone?", "acceptedAnswer": { "@type": "Answer", "text": "Collarone is a full business platform for Nigerian companies — HR, leave, tasks, visitor management, payroll, CRM, finance, projects, documents and more, all under one login, priced and billed in naira." } },
          { "@type": "Question", "name": "Is Collarone only for large companies?", "acceptedAnswer": { "@type": "Answer", "text": "No. Startup is ₦15,000 a month, includes any 3 suites of your choice, and every suite ships complete — not a stripped-down trial. Small teams get the same real directory, leave, tasks and visitor management as an Enterprise customer." } },
          { "@type": "Question", "name": "How much does Collarone cost?", "acceptedAnswer": { "@type": "Answer", "text": "Every tier is à la carte — pick whichever suites you need. Startup is ₦15,000/mo with 3 suites included (₦8,000 per extra suite). Standard is ₦25,000/mo with 5 included (₦6,000/extra). Enterprise is ₦45,000/mo with 8 included (₦4,000/extra). Every tier adds ₦2,000/staff, and paying yearly saves 15% off the total. Your rate locks in at sign-up. No dollar pricing, no forex markup." } },
          { "@type": "Question", "name": "Does Collarone include a website builder?", "acceptedAnswer": { "@type": "Answer", "text": "Yes, on every tier. Pick from 11 designed themes across online store, landing page and company-profile categories, edit every page and block directly, and already have a site? Just link it instead — no migration required." } },
          { "@type": "Question", "name": "Is there a CRM for managing customers?", "acceptedAnswer": { "@type": "Answer", "text": "Yes — contacts, companies, a WhatsApp-first activity log, a deals pipeline valued in naira, a bookings day-sheet for appointments, and a Money Owed tracker that ages what customers owe you. An embeddable contact-form widget captures leads from your own website too, straight into your CRM." } },
          { "@type": "Question", "name": "Can Collarone run my hiring end to end?", "acceptedAnswer": { "@type": "Answer", "text": "Yes — post a role to your public careers page, move applicants through a kanban pipeline with interview scorecards, email candidates from inside the pipeline, send the offer as a private link they accept online, then hire in one click: their staff login is created instantly and onboarding starts. Leave, tasks, visitors, performance reviews and a compliance vault are live too." } },
          { "@type": "Question", "name": "Is my company’s data secure?", "acceptedAnswer": { "@type": "Answer", "text": "Every screen checks who’s allowed to see it before showing anything, verified role by role, and every company's data is isolated from every other company's at the database level — verified directly, not just assumed." } },
          { "@type": "Question", "name": "Can Collarone write my company letters?", "acceptedAnswer": { "@type": "Answer", "text": "Yes. The HR Letters engine drafts confirmation, promotion, introduction, verification, query and warning letters — manually, from templates, or with Collarone AI — rendered live on your letterhead with your logo and authorized signature, auto-numbered, and filed into Documents automatically." } },
          { "@type": "Question", "name": "What about payroll?", "acceptedAnswer": { "@type": "Answer", "text": "Payroll is live and runs the 2026 Nigeria Tax Act rules — the new PAYE bands with the ₦800,000 exemption and rent relief, plus Pension, NHF and NSITF, configurable rate packs, staff loans repaid by deduction, and a Banking Wall so whoever liaises with your bank always knows what's new. It never touches your bank account directly — Collarone prepares the disbursement, your bank executes it." } },
          { "@type": "Question", "name": "Can I generate invoices and automate follow-ups?", "acceptedAnswer": { "@type": "Answer", "text": "Yes — Invoicing & Trade Docs generates sequential invoices your customers can pay from a shared link (bank transfer, or card straight into your own Paystack account), plus receipts, GRNs, stock passes and signed handover/return notes — all on your letterhead across 6 templates. Automation runs daily checks across your other suites — low-stock alerts, overdue-invoice reminders, new-lead follow-up tasks and more — and can optionally draft the follow-up message for you." } },
          { "@type": "Question", "name": "How long does it take to get started?", "acceptedAnswer": { "@type": "Answer", "text": "During early access, we set up your space personally — reach out on WhatsApp or email and we’ll have your business live the same day." } },
